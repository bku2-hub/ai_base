<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바퀴벌레 포커 (Cockroach Poker)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="turn-indicator" id="turnIndicator">👤 내 턴입니다!</div>
    
    <div class="game-board">
        <!-- Opponent Area -->
        <div class="opponent-area">
            <div class="avatar" id="opponentAvatar">🤖 상대방 (5장)</div>
            <div class="status-bubble" id="opponentStatus">대기 중...</div>
            <div class="hand opponent-hand" id="opponentHand">
                <!-- Opponent cards -->
            </div>
        </div>

        <!-- Play Area (Center) -->
        <div class="play-area" id="playArea">
            <div class="card-slot" id="tableSlot">
                <!-- Played card goes here -->
            </div>
        </div>

        <!-- Player Area -->
        <div class="player-area">
            <div class="hand" id="playerHand">
                <!-- Cards will be generated by JS -->
            </div>
            <div class="avatar-player" id="playerAvatar">👤 플레이어 (5장)</div>
        </div>
    </div>

    <!-- Modals / Overlays -->
    <div class="overlay hidden" id="overlay">
        <!-- Declaration Modal -->
        <div class="modal hidden" id="declareModal">
            <h2>어떤 벌레라고 속이시겠습니까?</h2>
            <div class="bug-options" id="bugOptions"></div>
        </div>
        
        <!-- Guess Modal -->
        <div class="modal hidden" id="guessModal">
            <h2 id="guessPrompt">상대방: "이 카드는 OOO 입니다."</h2>
            <p>상대방의 말이 진실일까요?</p>
            <div class="guess-options">
                <button class="btn guess-btn true-btn" onclick="playerGuess(true)">진실이다!</button>
                <button class="btn guess-btn false-btn" onclick="playerGuess(false)">거짓말!</button>
            </div>
        </div>

        <!-- Result Modal -->
        <div class="modal hidden" id="resultModal">
            <h2 id="resultTitle">결과</h2>
            <p id="resultMessage">상대방이 속았습니다!</p>
            <button class="btn" id="nextTurnBtn">다음 턴</button>
        </div>

        <!-- Game Over Modal -->
        <div class="modal hidden" id="gameOverModal">
            <h2 id="gameOverTitle">게임 종료</h2>
            <p id="gameOverMessage"></p>
            <button class="btn" onclick="location.reload()">다시 하기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
